<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="50%" stop-color="#161034"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4f9eff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- concentric disk motif -->
  <g transform="translate(400,225)" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.85">
    <circle r="150"/>
    <circle r="115"/>
    <circle r="80"/>
    <circle r="45"/>
  </g>
  <g transform="translate(400,225)" stroke="#e9e6ff" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="0" y1="0" x2="150" y2="-40"/>
    <circle cx="150" cy="-40" r="6" fill="#4f9eff" stroke="none"/>
    <circle r="7" fill="#8b5cf6" stroke="none"/>
  </g>
  <text x="400" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600"
        fill="#e9e6ff" text-anchor="middle" opacity="0.9">Disk Scheduling Simulator</text>
  <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="15" letter-spacing="2"
        fill="#a78bfa" text-anchor="middle" opacity="0.7">PROJECT PREVIEW · PLACEHOLDER</text>
</svg>
