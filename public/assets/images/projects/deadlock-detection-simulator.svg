<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="50%" stop-color="#161034"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- resource-allocation graph motif: nodes + directed edges forming a cycle -->
  <g stroke="#4f9eff" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M320,150 L480,150" marker-end="url(#arrow)"/>
    <path d="M500,175 L500,275" marker-end="url(#arrow)"/>
    <path d="M480,300 L320,300" marker-end="url(#arrow)"/>
    <path d="M300,275 L300,175" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4f9eff"/>
    </marker>
  </defs>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#0d1f3c" text-anchor="middle">
    <circle cx="300" cy="150" r="26" fill="#8b5cf6"/>
    <text x="300" y="156">P1</text>
    <rect x="474" y="130" width="52" height="40" rx="6" fill="#f59e0b"/>
    <text x="500" y="155">R1</text>
    <circle cx="500" cy="300" r="26" fill="#8b5cf6"/>
    <text x="500" y="306">P2</text>
    <rect x="274" y="280" width="52" height="40" rx="6" fill="#f59e0b"/>
    <text x="300" y="305">R2</text>
  </g>
  <text x="400" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600"
        fill="#e9e6ff" text-anchor="middle" opacity="0.9">Deadlock Detection Simulator</text>
  <text x="400" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="15" letter-spacing="2"
        fill="#a78bfa" text-anchor="middle" opacity="0.7">PROJECT PREVIEW · PLACEHOLDER</text>
</svg>
